<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunicados Oficiales — COPAVE</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark:   #1a7a2e;
    --green-mid:    #2d9e45;
    --green-light:  #4cba64;
    --green-pale:   #e8f5e9;
    --green-border: #a5d6a7;
    --white:        #ffffff;
    --text-dark:    #1b3a22;
    --text-muted:   #5a8a65;
    --shadow:       rgba(26, 122, 46, 0.25);
  }

  html, body {
    height: 100%;
    background: var(--green-pale);
    color: var(--text-dark);
    font-family: 'Open Sans', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── Header ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--green-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 64px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  /* SVG logo placeholder que imita el círculo de COPAVE */
  .logo-circle {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }

  .logo-circle svg {
    width: 26px;
    height: 26px;
    fill: white;
    opacity: 0.9;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .logo-text strong {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--white);
    letter-spacing: 0.06em;
  }

  .logo-text span {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    font-style: italic;
    letter-spacing: 0.03em;
  }

  .header-divider {
    width: 1px;
    height: 32px;
    background: rgba(255,255,255,0.3);
    margin: 0 20px;
  }

  .header-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .badge-count {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .badge-count em {
    font-style: normal;
    color: #a8e6b0;
  }

  /* ── Tagline strip ── */
  .tagline-strip {
    position: fixed;
    top: 64px; left: 0; right: 0;
    z-index: 99;
    background: var(--green-mid);
    text-align: center;
    padding: 5px 0;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    font-style: italic;
  }

  /* ── Stage ── */
  #stage {
    position: fixed;
    inset: 0;
    top: 90px;
    bottom: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1600px;
  }

  /* ── Book ── */
  #book {
    position: relative;
    width: min(560px, 88vw);
    height: min(790px, calc(100vh - 200px));
    transform-style: preserve-3d;
    filter: drop-shadow(0 20px 40px var(--shadow));
  }

  /* ── Pages ── */
  .page {
    position: absolute;
    inset: 0;
    border-radius: 3px 14px 14px 3px;
    overflow: hidden;
    box-shadow:
      -4px 0 16px rgba(0,0,0,0.35),
      4px 0 30px rgba(0,0,0,0.2),
      inset -2px 0 10px rgba(0,0,0,0.2);
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.70s cubic-bezier(0.77, 0, 0.18, 1),
                opacity   0.70s ease;
    will-change: transform;
    cursor: pointer;
    background: white;
  }

  .page img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  /* Page spine */
  .page::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 36px;
    height: 100%;
    background: linear-gradient(to right, rgba(0,0,0,0.35), transparent);
    pointer-events: none;
    z-index: 3;
  }

  /* Page right edge */
  .page::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 2px;
    height: 100%;
    background: linear-gradient(to bottom,
      rgba(255,255,255,0.15),
      rgba(255,255,255,0.05) 50%,
      rgba(255,255,255,0.1));
    pointer-events: none;
    z-index: 4;
  }

  /* Page states */
  .page.active {
    transform: rotateY(0deg);
    opacity: 1;
    z-index: 10;
  }
  .page.prev {
    transform: rotateY(-180deg);
    opacity: 0;
    z-index: 5;
    pointer-events: none;
  }
  .page.next {
    transform: rotateY(0deg);
    opacity: 0;
    z-index: 1;
    pointer-events: none;
  }
  .page.entering-from-left {
    transform: rotateY(-180deg);
    opacity: 0;
    z-index: 5;
    pointer-events: none;
  }

  /* Placeholder */
  .page-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #f1f8f2 0%, #e8f5e9 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    border: 2px dashed var(--green-border);
  }

  .placeholder-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--green-pale);
    border: 2px solid var(--green-border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .placeholder-icon svg {
    width: 32px;
    height: 32px;
    fill: var(--green-mid);
    opacity: 0.6;
  }

  .placeholder-text {
    text-align: center;
    max-width: 220px;
  }

  .placeholder-text p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .placeholder-text small {
    font-size: 12px;
    color: var(--green-border);
    font-style: italic;
  }

  /* ── Page number badge ── */
  .page-badge {
    position: absolute;
    bottom: 14px;
    right: 16px;
    background: var(--green-dark);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.9);
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    z-index: 5;
    pointer-events: none;
  }

  /* ── COPAVE corner watermark on pages ── */
  .page-watermark {
    position: absolute;
    top: 14px;
    right: 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    z-index: 5;
    pointer-events: none;
    background: rgba(26,122,46,0.55);
    padding: 3px 8px;
    border-radius: 10px;
    backdrop-filter: blur(4px);
  }

  /* ── Navigation ── */
  nav {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--green-dark);
    padding: 10px 20px;
    border-radius: 40px;
    box-shadow: 0 4px 20px var(--shadow);
  }

  .nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-family: 'Montserrat', sans-serif;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--green-light);
    border-color: var(--green-light);
    transform: scale(1.1);
  }

  .nav-btn:disabled {
    opacity: 0.25;
    cursor: default;
  }

  .dots {
    display: flex;
    gap: 7px;
    align-items: center;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.25s ease;
    border: none;
  }

  .dot.active {
    background: white;
    width: 24px;
    border-radius: 4px;
  }

  .dot:hover:not(.active) {
    background: rgba(255,255,255,0.6);
  }

  /* Nav label */
  .nav-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.1em;
    white-space: nowrap;
    padding: 0 4px;
  }

  /* ── Decorative side bars ── */
  .side-deco {
    position: fixed;
    top: 90px;
    bottom: 80px;
    width: 4px;
    border-radius: 2px;
    background: linear-gradient(to bottom,
      transparent,
      var(--green-mid) 30%,
      var(--green-mid) 70%,
      transparent);
    opacity: 0.3;
    pointer-events: none;
  }
  .side-deco.left  { left: 12px; }
  .side-deco.right { right: 12px; }

  /* ── Keyboard hint ── */
  .kb-hint {
    position: fixed;
    bottom: 84px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0.6;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 0 14px; height: 56px; }
    .header-divider { display: none; }
    .header-title { display: none; }
    #stage { top: 78px; }
    .tagline-strip { top: 56px; font-size: 10px; padding: 4px 0; }
    nav { gap: 10px; padding: 8px 14px; bottom: 14px; }
    .nav-btn { width: 34px; height: 34px; font-size: 16px; }
    .nav-label { display: none; }
    .side-deco { display: none; }
    .kb-hint { display: none; }
  }
</style>
</head>
<body>

<div class="side-deco left"></div>
<div class="side-deco right"></div>

<!-- Header estilo COPAVE -->
<header>
  <div class="logo-area">
    <div class="logo-circle">
      <img src="logo_copave_2026.webp" alt="Logo COPAVE" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
    </div>
    <div class="logo-text">
      <strong>COPAVE</strong>
      <span>Villas del Campo</span>
    </div>
  </div>

  <div class="header-divider"></div>
  <div class="header-title">Comunicados Oficiales</div>

  <div class="header-right">
    <div class="badge-count">
      <em id="current-num">1</em> / <em id="total-num">1</em>
    </div>
  </div>
</header>

<div class="tagline-strip">Por los derechos de todos</div>

<div id="stage">
  <div id="book"></div>
</div>

<div class="kb-hint">← → teclas de flecha &nbsp;|&nbsp; desliza en móvil</div>

<nav>
  <button class="nav-btn" id="btn-prev" onclick="goTo(currentIndex - 1)" title="Anterior">&#8592;</button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" id="btn-next" onclick="goTo(currentIndex + 1)" title="Siguiente">&#8594;</button>
</nav>

<script>
  // ════════════════════════════════════════════════
  //  COMUNICADOS — agrega tus imágenes aquí
  //  Pon la ruta relativa o URL completa de cada imagen
  // ════════════════════════════════════════════════
  const comunicados = [
    {
      imagen: 'comunicados/comunicado-01.jpg',
      titulo: 'Comunicado 01'
    },
    {
      imagen: 'comunicados/comunicado-02.jpg',
      titulo: 'Comunicado 02'
    },
    {
      imagen: 'comunicados/comunicado-03.jpg',
      titulo: 'Comunicado 03'
    },
    // Agrega más así:
    // { imagen: 'comunicados/comunicado-04.jpg', titulo: 'Comunicado 04' },
  ];
  // ════════════════════════════════════════════════

  let currentIndex = 0;
  let isAnimating  = false;

  const book    = document.getElementById('book');
  const dotsEl  = document.getElementById('dots');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const numEl   = document.getElementById('current-num');
  const totalEl = document.getElementById('total-num');

  totalEl.textContent = comunicados.length;

  comunicados.forEach((c, i) => {
    // Page
    const page = document.createElement('div');
    page.className = 'page ' + (i === 0 ? 'active' : 'next');
    page.dataset.index = i;

    if (c.imagen) {
      const img = document.createElement('img');
      img.src = c.imagen;
      img.alt = c.titulo;
      img.loading = 'lazy';
      img.onerror = () => {
        page.innerHTML = '';
        page.appendChild(makePlaceholder(c.titulo));
        page.appendChild(makeBadge(i + 1));
        page.appendChild(makeWatermark());
      };
      page.appendChild(img);
    } else {
      page.appendChild(makePlaceholder(c.titulo));
    }

    page.appendChild(makeBadge(i + 1));
    page.appendChild(makeWatermark());

    page.addEventListener('click', () => {
      if (i === currentIndex) goTo(currentIndex + 1);
    });

    book.appendChild(page);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);
  });

  function makePlaceholder(titulo) {
    const div = document.createElement('div');
    div.className = 'page-placeholder';
    div.innerHTML = `
      <div class="placeholder-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
      </div>
      <div class="placeholder-text">
        <p>Imagen del comunicado<br>no encontrada</p>
        <small>${titulo}</small>
      </div>`;
    return div;
  }

  function makeBadge(num) {
    const b = document.createElement('div');
    b.className = 'page-badge';
    b.textContent = `${num} / ${comunicados.length}`;
    return b;
  }

  function makeWatermark() {
    const w = document.createElement('div');
    w.className = 'page-watermark';
    w.textContent = 'COPAVE';
    return w;
  }

  function getPages() {
    return Array.from(book.querySelectorAll('.page'));
  }

  function goTo(index) {
    if (isAnimating) return;
    if (index < 0 || index >= comunicados.length) return;
    if (index === currentIndex) return;

    isAnimating = true;
    const pages = getPages();
    const dir   = index > currentIndex ? 'forward' : 'backward';
    const prev  = pages[currentIndex];
    const next  = pages[index];

    pages.forEach(p => { p.className = 'page next'; p.style.zIndex = 1; });

    if (dir === 'forward') {
      prev.className = 'page active'; prev.style.zIndex = 10;
      next.className = 'page next';   next.style.zIndex = 5;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        prev.className = 'page prev';   prev.style.zIndex = 5;
        next.className = 'page active'; next.style.zIndex = 10;
      }));
    } else {
      prev.className = 'page active';              prev.style.zIndex = 5;
      next.className = 'page entering-from-left';  next.style.zIndex = 10;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        prev.className = 'page next';   prev.style.zIndex = 1;
        next.className = 'page active'; next.style.zIndex = 10;
      }));
    }

    currentIndex = index;
    updateUI();
    setTimeout(() => { isAnimating = false; }, 740);
  }

  function updateUI() {
    dotsEl.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('active', i === currentIndex));
    btnPrev.disabled = currentIndex === 0;
    btnNext.disabled = currentIndex === comunicados.length - 1;
    numEl.textContent = currentIndex + 1;
  }

  // Teclado
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentIndex + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(currentIndex - 1);
  });

  // Swipe móvil
  let touchStartX = 0;
  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) goTo(currentIndex + (diff > 0 ? 1 : -1));
  });

  updateUI();
</script>
</body>
</html>
