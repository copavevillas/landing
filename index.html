    /* ── Overlay sutil para que el botón resalte ── */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 40%,
        rgba(20, 0, 40, 0.55) 75%,
        rgba(20, 0, 40, 0.85) 100%
      );
    }

    /* ── Área del botón ── */
    .cta-area {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 0 24px 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* Texto de urgencia sobre el botón */
    .urgencia {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 215, 0, 0.12);
      border: 1px solid rgba(255, 215, 0, 0.35);
      border-radius: 30px;
      padding: 7px 18px;
      animation: fadeInUp 0.8s ease both;
    }

    .urgencia span {
      font-size: 13px;
      font-weight: 800;
      color: #ffd700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .dot-pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4da6;
      box-shadow: 0 0 0 0 rgba(255, 77, 166, 0.6);
      animation: pulse-dot 1.4s ease infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%   { box-shadow: 0 0 0 0 rgba(255,77,166,0.7); }
      70%  { box-shadow: 0 0 0 8px rgba(255,77,166,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,77,166,0); }
    }

    /* ── Botón principal ── */
    .btn-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 420px;
      padding: 20px 28px;
      background: linear-gradient(135deg, #ff1a8c 0%, #c0006b 50%, #8b0047 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 18px;
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.3px;
      line-height: 1.2;
      text-align: center;
      box-shadow:
        0 0 0 3px rgba(255, 77, 166, 0.4),
        0 12px 40px rgba(255, 26, 140, 0.55),
        0 2px 0 rgba(255,255,255,0.15) inset;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.9s 0.15s ease both;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    /* Brillo animado que pasa sobre el botón */
    .btn-cta::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.22),
        transparent
      );
      animation: shine 2.4s ease infinite;
    }

    @keyframes shine {
      0%   { left: -100%; }
      40%  { left: 130%; }
      100% { left: 130%; }
    }

    .btn-cta:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow:
        0 0 0 4px rgba(255,77,166,0.5),
        0 20px 55px rgba(255,26,140,0.7),
        0 2px 0 rgba(255,255,255,0.15) inset;
    }

    .btn-cta:active {
      transform: translateY(-1px) scale(0.99);
    }

    .btn-icon {
      font-size: 24px;
      flex-shrink: 0;
      animation: wiggle 2s ease infinite;
    }

    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      20%     { transform: rotate(-12deg); }
      40%     { transform: rotate(12deg); }
      60%     { transform: rotate(-6deg); }
      80%     { transform: rotate(6deg); }
    }

    .btn-text-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .btn-sub {
      font-size: 11px;
      font-weight: 700;
      opacity: 0.8;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .btn-main {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.1;
    }

    /* Flecha animada */
    .btn-arrow {
      font-size: 22px;
      flex-shrink: 0;
      animation: arrowBounce 1s ease infinite;
    }

    @keyframes arrowBounce {
      0%,100% { transform: translateX(0); }
      50%     { transform: translateX(5px); }
    }

    /* Nota de confianza */
    .trust-note {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      text-align: center;
      letter-spacing: 0.3px;
      animation: fadeInUp 1s 0.3s ease both;
    }

    .trust-note span { color: rgba(255,215,0,0.75); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive: en pantallas más altas mostrar más del flyer ── */
    @media (min-height: 700px) {
      .cta-area { padding-bottom: 52px; }
    }

    @media (max-width: 400px) {
      .btn-main { font-size: 17px; }
      .btn-cta  { padding: 18px 20px; }
    }
  </style>
