<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GateFlow — Panel de administración</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #06090d;
    --sidebar:  #0a0f15;
    --surface:  #0e1520;
    --surface2: #121c28;
    --border:   #1a2535;
    --border2:  #243347;
    --accent:   #00d4ff;
    --accent2:  #0099cc;
    --success:  #00e676;
    --warn:     #ffb300;
    --error:    #ff4444;
    --text:     #ddeeff;
    --muted:    #4a6880;
    --muted2:   #7a9db5;
    --font-h:   'Syne', sans-serif;
    --font-b:   'DM Sans', sans-serif;
    --sidebar-w: 240px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-b);
    min-height: 100vh;
    display: flex;
    font-size: 14px;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 50;
  }

  .logo {
    padding: 1.5rem 1.25rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .logo h1 {
    font-family: var(--font-h);
    font-size: 1.375rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--text);
  }

  .logo h1 span { color: var(--accent); }

  .logo p {
    font-size: 0.7rem;
    color: var(--muted2);
    margin-top: 0.125rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }

  .nav-section {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.75rem 0.5rem 0.375rem;
    margin-top: 0.5rem;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.625rem 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted2);
    font-size: 0.85rem;
    font-weight: 400;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { background: var(--surface); color: var(--text); }

  .nav-item.active {
    background: rgba(0,212,255,0.1);
    color: var(--accent);
    font-weight: 500;
  }

  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  .nav-badge {
    margin-left: auto;
    background: var(--accent);
    color: var(--bg);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 20px;
    font-family: var(--font-h);
  }

  .nav-badge.warn { background: var(--warn); }
  .nav-badge.error { background: var(--error); }

  .sidebar-footer {
    padding: 1rem;
    border-top: 1px solid var(--border);
  }

  .user-card {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.625rem 0.75rem;
    border-radius: 8px;
    background: var(--surface);
  }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-h);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--bg);
    flex-shrink: 0;
  }

  .user-info p { font-size: 0.8rem; font-weight: 500; }
  .user-info span { font-size: 0.7rem; color: var(--muted2); }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 1.5rem;
    gap: 1rem;
    position: sticky;
    top: 0;
    background: rgba(6,9,13,0.9);
    backdrop-filter: blur(12px);
    z-index: 40;
  }

  .topbar-title {
    font-family: var(--font-h);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }

  .btn-sm {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.4rem 0.875rem;
    border-radius: 7px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-b);
    border: none;
  }

  .btn-sm svg { width: 14px; height: 14px; }

  .btn-accent {
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-h);
    font-weight: 700;
  }

  .btn-accent:hover { background: #1ae0ff; box-shadow: 0 0 16px rgba(0,212,255,0.3); }

  .btn-ghost {
    background: var(--surface);
    color: var(--muted2);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }

  /* ── CONTENT ── */
  .content { padding: 1.5rem; flex: 1; }

  /* Selector de vista de condominio */
  .cond-selector {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .cond-chip {
    padding: 0.375rem 0.875rem;
    border-radius: 20px;
    font-size: 0.8rem;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted2);
    background: none;
    font-family: var(--font-b);
  }

  .cond-chip:hover { border-color: var(--border2); color: var(--text); }

  .cond-chip.active {
    background: rgba(0,212,255,0.1);
    border-color: rgba(0,212,255,0.4);
    color: var(--accent);
  }

  /* Stats cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.125rem 1.25rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--border2); }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--stat-color, var(--accent));
    opacity: 0.7;
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  .stat-value {
    font-family: var(--font-h);
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--text);
    line-height: 1;
  }

  .stat-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.375rem;
  }

  .stat-sub .up   { color: var(--success); }
  .stat-sub .down { color: var(--error); }

  /* Grid principal */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }

  /* Panel card */
  .panel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .panel-head h3 {
    font-family: var(--font-h);
    font-size: 0.875rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .panel-head .count {
    font-size: 0.72rem;
    color: var(--muted2);
    margin-top: 1px;
  }

  /* Tabla de usuarios */
  .table { width: 100%; border-collapse: collapse; }

  .table th {
    padding: 0.625rem 1.25rem;
    text-align: left;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    font-weight: 500;
  }

  .table td {
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
    vertical-align: middle;
  }

  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: rgba(255,255,255,0.02); }

  .user-name { font-weight: 500; color: var(--text); }
  .user-meta { font-size: 0.72rem; color: var(--muted2); margin-top: 1px; }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .tag-active  { background: rgba(0,230,118,0.12); color: var(--success); }
  .tag-warn    { background: rgba(255,179,0,0.12);  color: var(--warn); }
  .tag-off     { background: rgba(255,68,68,0.12);  color: var(--error); }
  .tag-priv    { background: rgba(0,212,255,0.08);  color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }

  .tag-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .action-btns { display: flex; gap: 0.375rem; }

  .icon-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .icon-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
  .icon-btn.danger:hover { background: rgba(255,68,68,0.1); color: var(--error); border-color: var(--error); }
  .icon-btn.success:hover { background: rgba(0,230,118,0.1); color: var(--success); border-color: var(--success); }
  .icon-btn svg { width: 13px; height: 13px; }

  /* Privadas — estado ESP32 */
  .priv-list { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }

  .priv-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .priv-item:hover { border-color: var(--border2); }

  .esp-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .esp-dot.online  { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse-dot 2s ease infinite; }
  .esp-dot.offline { background: var(--error);   box-shadow: 0 0 8px var(--error); }
  .esp-dot.warn    { background: var(--warn);    box-shadow: 0 0 8px var(--warn); }

  .priv-info { flex: 1; }
  .priv-name { font-size: 0.82rem; font-weight: 500; }
  .priv-url  { font-size: 0.68rem; color: var(--muted); margin-top: 1px; font-family: monospace; }

  .priv-stats { text-align: right; }
  .priv-rssi  { font-size: 0.72rem; color: var(--muted2); }
  .priv-count { font-size: 0.68rem; color: var(--muted); }

  /* Log de actividad */
  .log-list { max-height: 280px; overflow-y: auto; }

  .log-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .log-item:hover { background: rgba(255,255,255,0.02); }
  .log-item:last-child { border: none; }

  .log-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .log-dot.ok   { background: var(--success); }
  .log-dot.deny { background: var(--error); }
  .log-dot.warn { background: var(--warn); }

  .log-body { flex: 1; }
  .log-name { font-size: 0.8rem; font-weight: 500; }
  .log-detail { font-size: 0.72rem; color: var(--muted2); margin-top: 1px; }
  .log-time { font-size: 0.68rem; color: var(--muted); white-space: nowrap; }

  /* Buscador */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.375rem 0.75rem;
  }

  .search-bar svg { width: 14px; height: 14px; color: var(--muted); flex-shrink: 0; }

  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-b);
    font-size: 0.82rem;
    width: 180px;
  }

  .search-bar input::placeholder { color: var(--muted); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 1.75rem;
    width: 100%;
    max-width: 420px;
    transform: scale(0.95) translateY(10px);
    transition: transform 0.2s;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal h3 {
    font-family: var(--font-h);
    font-size: 1.125rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 1.25rem;
  }

  .modal-field { margin-bottom: 1rem; }

  .modal-field label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.375rem;
  }

  .modal-field input,
  .modal-field select {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.625rem 0.875rem;
    color: var(--text);
    font-family: var(--font-b);
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .modal-field input:focus,
  .modal-field select:focus { border-color: var(--accent); }

  .modal-field select option { background: var(--surface2); }

  .modal-link {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.625rem 0.875rem;
    font-size: 0.75rem;
    color: var(--accent);
    font-family: monospace;
    word-break: break-all;
    line-height: 1.5;
    margin-bottom: 1.25rem;
  }

  .modal-actions { display: flex; gap: 0.625rem; justify-content: flex-end; margin-top: 1.25rem; }

  /* Animaciones */
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .content > * { animation: fadeIn 0.35s ease both; }

  /* Scrollbar personalizado */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">

    <h1>Gate<span>Flow</span></h1>
    <p>Panel de administración</p>
  </div>

  <nav class="nav">

    <button class="nav-item active" onclick="setView('dashboard')">

    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="avatar">SA</div>

        <p>Super Admin</p>
        <span>Todos los condominios</span>
      </div>

  </div>
</aside>

<!-- ── MAIN ── -->
<main class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">Dashboard</div>
    <div class="topbar-right">
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Buscar usuario..." oninput="filtrarUsuarios(this.value)">
      </div>
      <button class="btn-sm btn-accent" onclick="abrirModalUsuario()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Agregar usuario
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <!-- Se renderiza dinámicamente -->
  </div>

</main>

<!-- ── MODAL AGREGAR USUARIO ── -->
<div class="modal-overlay" id="modalUsuario">
  <div class="modal">
    <h3>Agregar usuario</h3>
    <div class="modal-field">
      <label>Nombre completo</label>
      <input type="text" id="m-nombre" placeholder="Juan García">
    </div>
    <div class="modal-field">
      <label>Chat ID de Telegram</label>
      <input type="text" id="m-chatid" placeholder="123456789" inputmode="numeric">
    </div>
    <div class="modal-field">
      <label>Correo electrónico</label>
      <input type="email" id="m-correo" placeholder="juan@correo.com">
    </div>
    <div class="modal-field">
      <label>Teléfono</label>
      <input type="tel" id="m-telefono" placeholder="55 1234 5678">
    </div>
    <div class="modal-field">
      <label>Condominio</label>
      <select id="m-condominio" onchange="actualizarPrivadasModal()">
        <option value="">— Selecciona —</option>
        <option value="cond_jardines">Cond. Jardines del Sol</option>
        <option value="cond_palmas">Cond. Las Palmas</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Privada</label>
      <select id="m-privada">
        <option value="">— Primero selecciona condominio —</option>
      </select>

<script>
  // ── CONFIGURACIÓN ─────────────────────────────────────
  const BASE_URL    = 'https://TU-DOMINIO.com'; // URL donde hosteaste registro.html

  // ─────────────────────────────────────────────────────

  const privadas = [
    { id: 'priv_jard_a', cond: 'cond_jardines', nombre: 'Privada A', url: 'http://jard-a.duckdns.org:8080', estado: 'online',  rssi: -52, aperturas: 34 },

    { id: 'priv_palm_s', cond: 'cond_palmas',   nombre: 'Privada Sur',   url: 'http://palm-s.duckdns.org:8080', estado: 'online',  rssi: -48, aperturas: 27 },
  ];

  let usuarios = [
    { chat_id: '123456789', nombre: 'Juan García',   correo: 'juan@gmail.com',  telefono: '7221234567', privada_id: 'priv_jard_a', condominio_id: 'cond_jardines', activo: true,  fecha_alta: '2024-01-10', fecha_vence: '2025-08-10' },
    { chat_id: '987654321', nombre: 'María López',   correo: 'maria@gmail.com', telefono: '7229876543', privada_id: 'priv_jard_a', condominio_id: 'cond_jardines', activo: true,  fecha_alta: '2024-01-12', fecha_vence: '2025-08-12' },
    { chat_id: '555123456', nombre: 'Ana Ruiz',      correo: 'ana@gmail.com',   telefono: '7225551234', privada_id: 'priv_jard_b', condominio_id: 'cond_jardines', activo: false, fecha_alta: '2024-02-05', fecha_vence: '2024-07-05' },
    { chat_id: '444789012', nombre: 'Carlos Vega',   correo: 'cvega@gmail.com', telefono: '7224449012', privada_id: 'priv_palm_n', condominio_id: 'cond_palmas',   activo: true,  fecha_alta: '2024-03-01', fecha_vence: '2025-09-01' },
    { chat_id: '333654987', nombre: 'Sofía Méndez',  correo: 'sofia@gmail.com', telefono: '7223336549', privada_id: 'priv_palm_s', condominio_id: 'cond_palmas',   activo: true,  fecha_alta: '2024-03-15', fecha_vence: '2025-07-15' },
  ];

  const logs = [
    { hora: '14:32', nombre: 'Juan García',  privada: 'Privada A', cond: 'Jardines', tipo: 'ok',   texto: 'Apertura exitosa' },
    { hora: '13:15', nombre: 'Ana Ruiz',     privada: 'Privada B', cond: 'Jardines', tipo: 'deny', texto: 'Acceso denegado (suspendida)' },
    { hora: '11:40', nombre: 'María López',  privada: 'Privada A', cond: 'Jardines', tipo: 'ok',   texto: 'Apertura exitosa' },
    { hora: '10:02', nombre: 'Carlos Vega',  privada: 'Priv. Norte', cond: 'Palmas', tipo: 'warn', texto: 'ESP32 sin respuesta' },
    { hora: '09:22', nombre: 'Sofía Méndez', privada: 'Privada Sur', cond: 'Palmas', tipo: 'ok',   texto: 'Apertura exitosa' },
    { hora: '08:55', nombre: 'Juan García',  privada: 'Privada A', cond: 'Jardines', tipo: 'ok',   texto: 'Apertura exitosa' },
  ];

  let condFiltro = 'all';

  // ── Navegación ─────────────────────────────────────────
  function setView(view) {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');

    const titles = { dashboard: 'Dashboard', usuarios: 'Usuarios', privadas: 'Privadas', logs: 'Registro de accesos', monitoreo: 'Monitoreo ESP32', condominios: 'Condominios', links: 'Generar links de registro' };
    document.getElementById('topbarTitle').textContent = titles[view] || view;

    const renders = { dashboard, usuarios: renderUsuarios, privadas: renderPrivadas, logs: renderLogs, monitoreo: renderMonitoreo, condominios: renderCondominios, links: () => abrirModalLink() };

    if (renders[view]) renders[view]();
  }

  function setContent(html) { document.getElementById('content').innerHTML = html; }

  // ── DASHBOARD ──────────────────────────────────────────
  function dashboard() {
    const activos   = usuarios.filter(u => u.activo).length;
    const inactivos = usuarios.filter(u => !u.activo).length;
    const hoy       = new Date();
    const porVencer = usuarios.filter(u => { const d = new Date(u.fecha_vence); return (d - hoy) / 86400000 <= 7 && u.activo; }).length;
    const offline   = privadas.filter(p => p.estado === 'offline').length;

    setContent(`
      <div class="cond-selector">
        <button class="cond-chip ${condFiltro==='all'?'active':''}" onclick="setCond('all')">Todos los condominios</button>
        ${condominios.map(c => `<button class="cond-chip ${condFiltro===c.id?'active':''}" onclick="setCond('${c.id}')">${c.nombre}</button>`).join('')}
      </div>

      <div class="stats">
        <div class="stat-card" style="--stat-color:var(--success)">
          <div class="stat-label">Usuarios activos</div>
          <div class="stat-value">${activos}</div>
          <div class="stat-sub"><span class="up">↑ 3</span> este mes</div>
        </div>
        <div class="stat-card" style="--stat-color:var(--error)">
          <div class="stat-label">Suspendidos</div>
          <div class="stat-value">${inactivos}</div>
          <div class="stat-sub">de ${usuarios.length} totales</div>
        </div>
        <div class="stat-card" style="--stat-color:var(--warn)">
          <div class="stat-label">Por vencer (7 días)</div>
          <div class="stat-value">${porVencer}</div>
          <div class="stat-sub">requieren renovación</div>
        </div>
        <div class="stat-card" style="--stat-color:var(--error)">
          <div class="stat-label">ESP32 offline</div>
          <div class="stat-value">${offline}</div>
          <div class="stat-sub">${privadas.length - offline} de ${privadas.length} online</div>
        </div>
      </div>

      <div class="grid-3">
        <div class="panel-card">
          <div class="panel-head">
            <div><h3>Últimas aperturas</h3><div class="count">Hoy</div></div>
          </div>
          <div class="log-list">
            ${logs.map(l => `
              <div class="log-item">
                <div class="log-dot ${l.tipo}"></div>
                <div class="log-body">
                  <div class="log-name">${l.nombre}</div>
                  <div class="log-detail">${l.privada} · ${l.cond} · ${l.texto}</div>
                </div>
                <div class="log-time">${l.hora}</div>
              </div>`).join('')}
          </div>
        </div>

        <div>
          <div class="panel-card">
            <div class="panel-head">
              <div><h3>Estado de privadas</h3><div class="count">${privadas.length} registradas</div></div>
            </div>
            <div class="priv-list">
              ${privadas.map(p => `
                <div class="priv-item">
                  <div class="esp-dot ${p.estado}"></div>
                  <div class="priv-info">
                    <div class="priv-name">${p.nombre}</div>
                    <div class="priv-url">${p.url}</div>
                  </div>
                  <div class="priv-stats">
                    <div class="priv-rssi">${p.rssi ? p.rssi + ' dBm' : 'offline'}</div>
                    <div class="priv-count">${p.aperturas} hoy</div>
                  </div>
                </div>`).join('')}
            </div>
          </div>
        </div>
      </div>
    `);
  }

  function setCond(id) { condFiltro = id; dashboard(); }

  // ── USUARIOS ───────────────────────────────────────────
  function renderUsuarios() {
    const filas = usuarios.map((u, i) => {
      const priv = privadas.find(p => p.id === u.privada_id);
      const cond = condominios.find(c => c.id === u.condominio_id);
      const daysLeft = Math.round((new Date(u.fecha_vence) - new Date()) / 86400000);
      const statusTag = !u.activo
        ? `<span class="tag tag-off"><span class="tag-dot"></span>Suspendido</span>`
        : daysLeft <= 5
        ? `<span class="tag tag-warn"><span class="tag-dot"></span>Vence en ${daysLeft}d</span>`
        : `<span class="tag tag-active"><span class="tag-dot"></span>Activo</span>`;

      return `
        <tr>
          <td>
            <div class="user-name">${u.nombre}</div>
            <div class="user-meta">${u.chat_id} · ${u.correo}</div>
          </td>
          <td><span class="tag tag-priv">${priv?.nombre || u.privada_id}</span></td>
          <td><span style="font-size:0.78rem;color:var(--muted2)">${cond?.nombre || u.condominio_id}</span></td>
          <td>${statusTag}</td>
          <td style="font-size:0.78rem;color:var(--muted2)">${u.fecha_vence}</td>
          <td>
            <div class="action-btns">
              <button class="icon-btn" title="Renovar 30 días" onclick="renovar(${i})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
              </button>
              <button class="icon-btn ${u.activo?'danger':'success'}" title="${u.activo?'Suspender':'Activar'}" onclick="toggleActivo(${i})">
                ${u.activo
                  ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>`
                  : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`}
              </button>
              <button class="icon-btn" title="Generar link de renovación" onclick="alert('Link de renovación copiado al portapapeles')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              </button>
            </div>
          </td>
        </tr>`;
    }).join('');

    setContent(`
      <div class="panel-card">
        <div class="panel-head">
          <div><h3>Todos los usuarios</h3><div class="count">${usuarios.length} registrados</div></div>
          <button class="btn-sm btn-ghost" onclick="exportarCSV()">Exportar CSV</button>
        </div>
        <table class="table" id="tablaUsuarios">
          <thead>
            <tr>
              <th>Usuario</th>
              <th>Privada</th>
              <th>Condominio</th>
              <th>Estado</th>
              <th>Vence</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>${filas}</tbody>
        </table>
      </div>
    `);
  }

  function toggleActivo(i) {
    usuarios[i].activo = !usuarios[i].activo;
    renderUsuarios();
    // En producción: PUT a n8n webhook que actualiza Sheets
  }

  function renovar(i) {
    const nueva = new Date();
    nueva.setDate(nueva.getDate() + 30);
    usuarios[i].fecha_vence = nueva.toISOString().split('T')[0];
    usuarios[i].activo = true;
    renderUsuarios();
    // En producción: PUT a n8n webhook que actualiza Sheets
  }

  function filtrarUsuarios(q) {
    const filas = document.querySelectorAll('#tablaUsuarios tbody tr');
    filas.forEach(tr => {
      tr.style.display = tr.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
    });
  }

  function exportarCSV() {
    const cols = ['chat_id','nombre','correo','telefono','privada_id','condominio_id','activo','fecha_alta','fecha_vence'];
    const csv  = [cols.join(','), ...usuarios.map(u => cols.map(c => u[c]).join(','))].join('\n');
    const a    = document.createElement('a');
    a.href     = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'gateflow_usuarios.csv';
    a.click();
  }

  // ── PRIVADAS ───────────────────────────────────────────
  function renderPrivadas() {
    setContent(`
      <div class="panel-card">
        <div class="panel-head">
          <div><h3>Privadas registradas</h3><div class="count">${privadas.length} en total</div></div>
        </div>
        <div class="priv-list" style="padding:1rem">
          ${privadas.map(p => {
            const cond = condominios.find(c => c.id === p.cond);
            return `
            <div class="priv-item">
              <div class="esp-dot ${p.estado}"></div>
              <div class="priv-info">
                <div class="priv-name">${p.nombre} <span style="font-size:0.7rem;color:var(--muted)">· ${cond?.nombre}</span></div>
                <div class="priv-url">${p.url}/open</div>
              </div>
              <div class="priv-stats">
                <div class="priv-rssi">${p.rssi ? p.rssi + ' dBm' : '—'}</div>
                <div class="priv-count">${p.aperturas} aperturas hoy</div>
              </div>
              <div class="action-btns" style="margin-left:0.75rem">
                <button class="icon-btn" title="Ping" onclick="pingEsp('${p.id}')">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                </button>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `);
  }

  function pingEsp(id) { alert('Ping enviado a ' + id + ' — revisa el log de monitoreo'); }

  // ── LOGS ───────────────────────────────────────────────
  function renderLogs() {
    setContent(`
      <div class="panel-card">
        <div class="panel-head">
          <div><h3>Registro de accesos</h3><div class="count">Últimos 50</div></div>
        </div>
        <div class="log-list" style="max-height:600px">
          ${[...logs,...logs].map(l => `
            <div class="log-item">
              <div class="log-dot ${l.tipo}"></div>
              <div class="log-body">
                <div class="log-name">${l.nombre}</div>
                <div class="log-detail">${l.privada} · ${l.cond} · ${l.texto}</div>
              </div>
              <div class="log-time">${l.hora}</div>
            </div>`).join('')}
        </div>
      </div>
    `);
  }

  // ── MONITOREO ─────────────────────────────────────────
  function renderMonitoreo() {
    setContent(`
      <div class="stats" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card" style="--stat-color:var(--success)">
          <div class="stat-label">Online</div>
          <div class="stat-value">${privadas.filter(p=>p.estado==='online').length}</div>
        </div>
        <div class="stat-card" style="--stat-color:var(--error)">
          <div class="stat-label">Offline</div>
          <div class="stat-value">${privadas.filter(p=>p.estado==='offline').length}</div>
        </div>
        <div class="stat-card" style="--stat-color:var(--accent)">
          <div class="stat-label">Total ESP32</div>
          <div class="stat-value">${privadas.length}</div>
        </div>
      </div>
      <div class="panel-card">
        <div class="panel-head"><div><h3>Estado en tiempo real</h3><div class="count">Actualizado hace 2 min</div></div>
          <button class="btn-sm btn-ghost" onclick="renderMonitoreo()">↻ Refrescar</button>
        </div>
        <div class="priv-list" style="padding:1rem">
          ${privadas.map(p => {
            const cond = condominios.find(c=>c.id===p.cond);
            return `
            <div class="priv-item">
              <div class="esp-dot ${p.estado}"></div>
              <div class="priv-info">
                <div class="priv-name">${p.nombre} <span style="color:var(--muted);font-size:0.7rem">· ${cond?.nombre}</span></div>
                <div class="priv-url">${p.url}</div>
              </div>
              <div style="margin-left:auto;text-align:right">
                <div style="font-size:0.8rem;color:${p.estado==='online'?'var(--success)':'var(--error)'}">
                  ${p.estado === 'online' ? '● Online' : '● Offline'}
                </div>
                <div class="priv-count">RSSI: ${p.rssi ?? 'N/A'}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `);
  }

  // ── CONDOMINIOS ───────────────────────────────────────
  function renderCondominios() {
    setContent(`
      <div class="panel-card">
        <div class="panel-head">
          <div><h3>Condominios</h3></div>
          <button class="btn-sm btn-accent">+ Agregar condominio</button>
        </div>
        <table class="table">
          <thead><tr><th>ID</th><th>Nombre</th><th>Ciudad</th><th>Privadas</th><th>Usuarios activos</th></tr></thead>
          <tbody>
            ${condominios.map(c => {
              const privs = privadas.filter(p=>p.cond===c.id).length;
              const usrs  = usuarios.filter(u=>u.condominio_id===c.id && u.activo).length;
              return `<tr>
                <td style="font-family:monospace;font-size:0.78rem;color:var(--muted2)">${c.id}</td>
                <td><div class="user-name">${c.nombre}</div></td>
                <td style="color:var(--muted2)">${c.ciudad}</td>
                <td>${privs}</td>
                <td>${usrs}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `);
  }

  // ── GENERAR LINKS ─────────────────────────────────────
  const privPorCond = {
    cond_jardines: [{ id:'priv_jard_a', nombre:'Privada A' }, { id:'priv_jard_b', nombre:'Privada B' }],
    cond_palmas:   [{ id:'priv_palm_n', nombre:'Privada Norte' }, { id:'priv_palm_s', nombre:'Privada Sur' }],
  };

  function actualizarPrivadasModal() {
    const cond  = document.getElementById('m-condominio').value;
    const sel   = document.getElementById('m-privada');
    sel.innerHTML = (privPorCond[cond] || []).map(p => `<option value="${p.id}">${p.nombre}</option>`).join('') || '<option>— Selecciona condominio —</option>';
  }

  function generarLink() {
    const cond  = document.getElementById('l-condominio').value;
    const priv  = document.getElementById('l-privada').value;
    const sel   = document.getElementById('l-privada');

    if (cond && !priv) {
      sel.innerHTML = (privPorCond[cond] || []).map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
    }

    const c = document.getElementById('l-condominio').value;
    const p = document.getElementById('l-privada').value;
    const condObj = condominios.find(x=>x.id===c);
    const privObj = privadas.find(x=>x.id===p);

    if (c && p) {
      const link = `${BASE_URL}/registro.html?condominio=${c}&privada=${p}&cond_nombre=${encodeURIComponent(condObj?.nombre||c)}&priv_nombre=${encodeURIComponent(privObj?.nombre||p)}`;
      document.getElementById('linkGenerado').textContent = link;
    }
  }

  function copiarLink() {
    const txt = document.getElementById('linkGenerado').textContent;
    navigator.clipboard.writeText(txt).then(() => alert('¡Link copiado al portapapeles!'));
  }

  // ── MODALES ───────────────────────────────────────────
  function abrirModalUsuario() {
    document.getElementById('modalUsuario').classList.add('open');
  }

  function abrirModalLink() {
    document.getElementById('modalLink').classList.add('open');
    setContent('<div style="padding:2rem;color:var(--muted2)">Genera links desde el modal que se abrió →</div>');
  }

  function cerrarModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  function guardarUsuario() {
    const nombre    = document.getElementById('m-nombre').value.trim();
    const chatId    = document.getElementById('m-chatid').value.trim();
    const correo    = document.getElementById('m-correo').value.trim();
    const telefono  = document.getElementById('m-telefono').value.trim();
    const condId    = document.getElementById('m-condominio').value;
    const privId    = document.getElementById('m-privada').value;
    const dias      = parseInt(document.getElementById('m-dias').value) || 30;

    if (!nombre || !chatId || !condId || !privId) { alert('Completa todos los campos requeridos'); return; }

    const vence = new Date();
    vence.setDate(vence.getDate() + dias);

    usuarios.push({
      chat_id: chatId, nombre, correo, telefono,
      privada_id: privId, condominio_id: condId,
      activo: true,
      fecha_alta:  new Date().toISOString().split('T')[0],
      fecha_vence: vence.toISOString().split('T')[0],
    });

    cerrarModal('modalUsuario');
    renderUsuarios();
    // En producción: POST a n8n webhook que escribe en Sheets
  }

  // Cerrar modal al hacer click fuera
  document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
  });

  // ── Iniciar en dashboard ──────────────────────────────
  dashboard();
</script>
</body>
</html>
